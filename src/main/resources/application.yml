spring:
  application:
    name: code-analyzer-spring-ai
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-haiku-4-5-20251001
          max-tokens: 2048
          temperature: 0.1  # Faible température = réponses plus déterministes

  threads:
    virtual:
      enabled: true  # Java 21 — Project Loom : threads virtuels pour les appels LLM bloquants

  cache:
    type: caffeine
    cache-names: analyses, reviews, summaries
    caffeine:
      spec: maximumSize=200,expireAfterWrite=60m

server:
  port: 8080
  error:
    include-stacktrace: always
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.ai: DEBUG